name: Supabase Keep-Alive

# Supabase 免費方案：7 天無請求後專案會被暫停。
# 此 Workflow 每日發送一次請求，確保專案持續存活。

on:
  schedule:
    - cron: '0 2 * * *'   # 每日 02:00 UTC（台灣時間 10:00）
  workflow_dispatch:        # 允許手動觸發（測試用）

jobs:
  ping:
    name: Ping Supabase REST API
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Supabase
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" = "000" ]; then
            echo "::error::Supabase 無法連線（curl timeout 或網路錯誤），專案可能已暫停"
            exit 1
          elif [ "$HTTP_STATUS" -ge 500 ]; then
            echo "::error::Supabase 回應 $HTTP_STATUS，伺服器異常"
            exit 1
          elif [ "$HTTP_STATUS" -ge 400 ]; then
            echo "::warning::Supabase 回應 $HTTP_STATUS — 專案存活，但 API key 可能有誤，請至 GitHub Settings > Secrets 確認 SUPABASE_ANON_KEY"
          else
            echo "Supabase ping 成功 (HTTP $HTTP_STATUS)"
          fi
