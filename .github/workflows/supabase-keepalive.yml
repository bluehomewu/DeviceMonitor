name: Supabase Keep-Alive

# 每日 ping 一次 /auth/v1/health，確認自架 Supabase 服務正常運行。
# /auth/v1/health 不需要任何 auth header，正常時回傳 HTTP 200。

on:
  schedule:
    - cron: '0 2 * * *'   # 每日 02:00 UTC（台灣時間 10:00）
  workflow_dispatch:        # 允許手動觸發（測試用）

jobs:
  ping:
    name: Ping Supabase Health
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          # 清除複製貼上時可能混入的換行 / 空白 / 結尾斜線
          URL="$(echo -n "$SUPABASE_URL" | tr -d '[:space:]')"
          URL="${URL%/}"

          echo "Target: $URL/auth/v1/health"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "$URL/auth/v1/health")

          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" = "000" ]; then
            echo "::error::Supabase 無法連線（curl timeout 或網路錯誤）"
            exit 1
          elif [ "$HTTP_STATUS" -ge 500 ]; then
            echo "::error::Supabase 回應 $HTTP_STATUS，伺服器異常"
            exit 1
          else
            echo "Supabase ping 成功 (HTTP $HTTP_STATUS)"
          fi
